name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/site'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ShieldTransfer ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          body: |
            ## ShieldTransfer: Privacy-First Token Transfer

            Live: https://qryptumorg.github.io/site/

            ### What's included
            - Landing page with QryptSafe, QryptShield, QryptAir hero sections
            - 40+ feature pages (Privacy, Terms, Bento, Quantum Design)
            - Sepolia verified record pages: V1 through V6
            - Multi-language support: EN, RU, ZH on all record pages
            - Live on-chain TX section per record page
            - Version history linking V1 through V6

            ### QryptSafe Contract Versions
            | Version | Factory |
            |---|---|
            | V1 | 0xd05F4fb3f24C7bF0cb482123186CF797E42CF17A |
            | V2 | 0x26BAb8B6e88201ad4824ea1290a7C9c7b9B10fCf |
            | V3 | 0x88E8eAFafc99E83e687BCAbD53F783a92e51F75c |
            | V4 | 0x611Ba6F93fAeC0203eBee1c3e35d72C1e5ba560F |
            | V5 | 0xB757fb0511A6d305370a20a0647C751D7E76D2ce |
            | V6 (Active) | 0xeaa722e996888b662E71aBf63d08729c6B6802F4 |

            ---
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
